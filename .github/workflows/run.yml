name: stock-run

on:
  schedule:
    - cron: "10 9 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install packages
        run: pip install requests pandas

      - name: run stock scan
        run: python main.py
